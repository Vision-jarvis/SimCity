global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'simcity-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /health

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']

  - job_name: 'neo4j'
    static_configs:
      - targets: ['neo4j:7474']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
