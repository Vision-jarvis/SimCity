groups:
  - name: simcity_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "More than 5% of requests are returning 5xx errors."

      - alert: APIDown
        expr: up{job="simcity-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "SimCity API is down"

      - alert: KafkaLag
        expr: kafka_consumer_group_lag > 10000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag exceeds 10,000 messages"

      - alert: Neo4jDown
        expr: up{job="neo4j"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Neo4j database is unreachable"

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes > 2e9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Process using more than 2GB memory"
