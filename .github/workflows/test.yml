name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          pip install numpy pandas scikit-learn pydantic requests httpx
          pip install networkx python-louvain
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install fastapi uvicorn strawberry-graphql[fastapi]
          pip install langgraph langchain-core

      - name: Run tests
        run: |
          python -m pytest tests/ -q --tb=short
          python -m pytest nlp/tests/ -q --tb=short
          python -m pytest ingestion/tests/ -q --tb=short
          python -m pytest graph/tests/ -q --tb=short
          python -m pytest api/tests/ -q --tb=short
