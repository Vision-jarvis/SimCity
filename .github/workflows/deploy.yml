name: Deploy
on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -t simcity-api:${{ github.sha }} .

      - name: Build Frontend Docker image
        run: docker build -t simcity-frontend:${{ github.sha }} ./frontend

      - name: Smoke test API image
        run: |
          docker run -d --name simcity-api -p 8000:8000 simcity-api:${{ github.sha }}
          # Poll /health with retries — the API gracefully degrades without
          # Kafka/Neo4j/Redis, so it should report healthy on its own.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health; then
              echo "API healthy"; exit 0
            fi
            echo "waiting for API to boot... ($i/30)"; sleep 3
          done
          echo "API did not become healthy:"; docker logs simcity-api; exit 1

      - name: Teardown
        if: always()
        run: docker rm -f simcity-api || true
