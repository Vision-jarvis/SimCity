name: Nightly Retrain
on:
  schedule:
    # 03:00 UTC daily — Phase 3 roadmap: scheduled retraining pipeline.
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force retraining regardless of drift"
        type: boolean
        default: false

jobs:
  drift-check-and-retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scikit-learn
          # mlflow is optional; the pipeline falls back to a local store without it.
          pip install mlflow || echo "mlflow unavailable; using local registry"

      - name: Run drift check + conditional retrain (demo trainer)
        run: |
          # Replace --demo with a real PyG-backed run once GPU/data are wired.
          python run_training_pipeline.py schedule \
            --observed-mae 0.55 \
            ${{ github.event.inputs.force == 'true' && '--force' || '' }} \
            --demo

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrain-runs
          path: mlruns_local/
          if-no-files-found: ignore
