name: Nightly Retrain
on:
  schedule:
    # 03:00 UTC daily — Phase 3 roadmap: scheduled retraining pipeline.
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force retraining regardless of drift"
        type: boolean
        default: false

jobs:
  drift-check-and-retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "numpy>=1.26,<2" pandas scikit-learn
          # NOTE: mlflow is intentionally NOT installed. CI has no MLflow
          # tracking server, so this job must exercise the local-JSON registry
          # fallback. (Previously `pip install mlflow` pulled mlflow 3.x, whose
          # client then spent ~5 minutes retrying http://localhost:5000 before
          # crashing the run.)

      - name: Run drift check + conditional retrain (demo trainer)
        env:
          # Belt-and-braces: if mlflow is ever present, fail fast instead of
          # sitting through minutes of HTTP retries against a dead server.
          MLFLOW_HTTP_REQUEST_TIMEOUT: "5"
          MLFLOW_HTTP_REQUEST_MAX_RETRIES: "1"
        run: |
          # Replace --demo with a real PyG-backed run once GPU/data are wired.
          python run_training_pipeline.py schedule \
            --observed-mae 0.55 \
            ${{ github.event.inputs.force == 'true' && '--force' || '' }} \
            --demo

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrain-runs
          path: mlruns_local/
          if-no-files-found: ignore
