# Helm values for the SimCity stack.
#
# These mirror the kustomize manifests under infra/k8s and provide a single
# tunable surface for a Helm-based install (e.g. via a generic chart such as
# bjw-s/app-template, or your own umbrella chart). Override per environment
# with `-f values.prod.yaml`.

global:
  namespace: simcity
  imagePullPolicy: IfNotPresent

api:
  image:
    repository: ghcr.io/your-org/simcity-api
    tag: latest
  replicas: 1
  env:
    NEO4J_URI: bolt://neo4j:7687
    REDIS_URL: redis://redis:6379
    KAFKA_BROKER_URL: kafka:9092
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: "1", memory: 2Gi }

frontend:
  image:
    repository: ghcr.io/your-org/simcity-frontend
    tag: latest
  replicas: 1
  service:
    type: NodePort
    nodePort: 30000
  env:
    NEXT_PUBLIC_API_URL: http://api:8000
    NEXT_PUBLIC_WS_URL: ws://api:8000/ws/stream

neo4j:
  image: neo4j:5.12.0
  auth: neo4j/changeme-in-production
  persistence:
    enabled: true
    size: 20Gi
  plugins: '["apoc"]'

kafka:
  image: confluentinc/cp-kafka:7.5.0
  logRetentionHours: 168
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0

redis:
  image: redis:7-alpine
  maxmemory: 256mb
  maxmemoryPolicy: allkeys-lru

monitoring:
  prometheus:
    enabled: true
  grafana:
    enabled: true
    adminPassword: admin
