# Apply the full SimCity stack with:  kubectl apply -k infra/k8s
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: simcity

resources:
  - namespace.yaml
  - kafka/kafka.yaml
  - neo4j/neo4j.yaml
  - redis/redis.yaml
  - api/api.yaml
  - frontend/frontend.yaml

# Override these tags in an overlay or with `kustomize edit set image`.
images:
  - name: simcity-api
    newName: ghcr.io/your-org/simcity-api
    newTag: latest
  - name: simcity-frontend
    newName: ghcr.io/your-org/simcity-frontend
    newTag: latest
