# Neo4j Community Edition with a persistent volume for the SimCity graph.
apiVersion: v1
kind: Secret
metadata:
  name: neo4j-auth
type: Opaque
stringData:
  # Override before deploying: kubectl create secret generic neo4j-auth ...
  NEO4J_AUTH: neo4j/changeme-in-production
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: neo4j }
  template:
    metadata:
      labels: { app: neo4j }
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.12.0
          ports:
            - { containerPort: 7474, name: http }
            - { containerPort: 7687, name: bolt }
          envFrom:
            - secretRef: { name: neo4j-auth }
          env:
            - { name: NEO4J_PLUGINS, value: '["apoc"]' }
          volumeMounts:
            - { name: data, mountPath: /data }
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits: { cpu: "2", memory: "4Gi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: neo4j-data
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
spec:
  selector: { app: neo4j }
  ports:
    - { name: http, port: 7474, targetPort: 7474 }
    - { name: bolt, port: 7687, targetPort: 7687 }
